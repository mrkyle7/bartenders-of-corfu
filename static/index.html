<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bartenders of Corfu</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4a2c0e">
    <script src="/static/script.js"></script>
    <link rel="stylesheet" href="/static/css/base.css">
</head>

<body>
    <header class="user-header"><span id="helloUser"></span><a class="notif-bell hidden" id="notificationBell"
            href="#myGamesSection" aria-label="Games waiting for your turn"><svg width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span
            class="notif-badge">0</span></a><a class="hidden" id="adminLink"
            href="/admin">Admin</a><a class="hidden" id="logoutLink"
            href="/logout">Logout</a><a class="hidden" id="loginLink" href="/login">Login</a></header>
    <main>
        <img src="/static/bartenders.png" alt="Illustration of bartenders mixing cocktails" class="bartender-image"
            role="img" aria-describedby="bartender-desc">
        <h1>Welcome to Bartenders of Corfu</h1>
        <p>Mix, shake, and serve! Create amazing cocktails and become the ultimate bartender, before you get too drunk!
        </p>
        <button aria-label="Start new game" onclick="createNewGame()">Start Mixing Cocktails</button>
        <p id="gameListError" role="alert" aria-live="polite" class="hidden error-msg"></p>
        <section class="game-section hidden" id="myGamesSection">
            <h2>Your Games</h2>
            <div class="status-filter" role="tablist" aria-label="Filter games by status">
                <button role="tab" class="filter-tab active" aria-selected="true" data-status="STARTED" onclick="setMyGamesFilter('STARTED')">In Progress</button>
                <button role="tab" class="filter-tab" aria-selected="false" data-status="ENDED" onclick="setMyGamesFilter('ENDED')">Finished</button>
                <button role="tab" class="filter-tab" aria-selected="false" data-status="" onclick="setMyGamesFilter('')">All</button>
            </div>
            <ul id="myGameList" aria-live="polite"></ul>
        </section>
        <section class="game-section" id="joinGamesSection">
            <h2>Join a Game</h2>
            <ul id="joinGameList" aria-live="polite"></ul>
        </section>
    </main>
    <footer>
        <p>
            <a href="/docs" target="_blank">API</a> |
            <a href="https://github.com/mrkyle7/bartenders-of-corfu" target="_blank">Source</a> |
            <a href="https://github.com/mrkyle7/bartenders-of-corfu/issues" target="_blank">Support</a>
        </p>
    </footer>
    <script>
        window.addEventListener('load', () => {

            performance.getEntriesByType('resource')
                .filter(entry => ['script', 'link'].includes(entry.initiatorType))
                .forEach(entry => {
                    console.log(`${entry.name} took ${entry.duration.toFixed(2)} ms`);
                });

            const lastRequest = performance.getEntriesByType('resource')
                .filter(r => !r.name.includes('favicon') && !r.name.includes('analytics')) // optional filtering
                .reduce((latest, entry) => {
                    return entry.responseEnd > (latest?.responseEnd || 0) ? entry : latest;
                }, null);

            const trueEnd = lastRequest?.responseEnd || 0;
            console.log(`Last network activity at: ${trueEnd.toFixed(2)} ms`);
        });
        setLogOutLink();
        init();
    </script>
</body>

</html>
