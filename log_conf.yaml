version: 1
disable_existing_loggers: False
formatters:
  json:
    "()": app.logging_config.JsonFormatter
handlers:
  default:
    formatter: json
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    level: INFO
    handlers:
      - default
    propagate: no
  uvicorn.error:
    level: INFO
    handlers:
      - default
    propagate: no
  # Access logs are replaced by CanonicalLogMiddleware — silence uvicorn's
  # default access logger to avoid duplicate per-request log lines.
  uvicorn.access:
    level: WARNING
    handlers:
      - default
    propagate: no
root:
  level: INFO
  handlers:
    - default
